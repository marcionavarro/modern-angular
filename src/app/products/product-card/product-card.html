<mat-card class="product-card">
  <mat-card-header>
    <mat-card-title>{{ product().name }}</mat-card-title>
    <mat-card-subtitle>Categoria</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (product().originalPrice) {
      <span class="sale-badge">À venda</span>
      <p class="price-row">
        <span class="current-price">{{ product().price | number: '1.2-2' }}</span>
        <span class="original-price">{{ product().originalPrice | number: '1.2-2' }}</span>
      </p>
    } @else {
      <span class="current-price">{{ product().price | number: '1.2-2' }}</span>
    }

    <p>{{ product().description }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button matButton (click)="onAddToCart()">{{ addButtonLabel() }}</button>
  </mat-card-actions>
</mat-card>
